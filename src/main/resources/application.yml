server:
  port: ${PORT:8080}

spring:
  main:
    banner-mode: off
  threads:
    virtual:
      enabled: true
  devtools:
    add-properties: false
  datasource:
    url: jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
    username: sa
    password: sa
springdoc:
  api-docs:
    path: /api-docs
management:
  server:
    port: ${PORT:8081}
  endpoint:
    metrics:
      enabled: false
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  jwt-secret: ${JWT_SECRET:59fedfab-9fa7-4a33-9ea0-c76e7729009a}
  jwt-expiration-ms: 86400000
---

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/springbootstrap
    username: postgres
    password: postgres
  config:
    activate:
      on-profile: local-postgresql
---

spring:
  main:
    banner-mode: console
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  devtools:
    add-properties: true
    restart:
      enabled: true
    livereload:
      enabled: true
  config:
    activate:
      on-profile: dev
server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param

logging:
  level:
    com.renato.springbootstrap: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoint:
    health:
      show-details: always
